name: Build Android APK From Zip
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Unzip and Find Project Root
        run: |
          # 1. Rozpakowanie pliku zip
          unzip fObywatel-main.zip
          
          # 2. Dynamiczne szukanie gdzie jest plik package.json
          PACKAGE_PATH=$(find . -name "package.json" | head -n 1)
          PROJECT_ROOT=$(dirname "$PACKAGE_PATH")
          
          echo "Znaleziono katalog główny projektu: $PROJECT_ROOT"
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: Generate Manifest Automatically
        run: |
          cd ${{ env.PROJECT_ROOT }}
          
          # Upewniamy się, że ścieżka na manifest istnieje
          mkdir -p android/app/src/main
          
          # Tworzenie pliku AndroidManifest.xml od zera
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.mobywatel">

              <uses-permission android:name="android:permission.INTERNET" />
              <uses-permission android:name="android:permission.SYSTEM_ALERT_WINDOW"/>

              <application
                android:name=".MainApplication"
                android:label="mObywatel"
                android:icon="@mipmap/ic_launcher"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:allowBackup="false"
                android:theme="@style/AppTheme">
                
                <activity
                  android:name=".MainActivity"
                  android:label="mObywatel"
                  android:configChanges="keyboard|keyboardHidden|orientation|screenSize|screenLayout|styleSheets"
                  android:launchMode="singleTask"
                  android:windowSoftInputMode="adjustResize"
                  android:exported="true">
                  <intent-filter>
                      <action android:name="android.intent.action.MAIN" />
                      <category android:name="android.intent.category.LAUNCHER" />
                  </intent-filter>
                </activity>
              </application>
          </manifest>
          EOF
          
          echo "Plik AndroidManifest.xml został pomyślnie wygenerowany!"

      - name: Install Dependencies
        run: |
          cd ${{ env.PROJECT_ROOT }}
          npm install --legacy-peer-deps

      - name: Build Release APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          # Szukanie folderu z plikiem gradlew i kompilacja APK
          TARGET_DIR=$(find . -name "gradlew" -exec dirname {} \;)
          cd $TARGET_DIR
          
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobywatel-apk
          path: "**/build/outputs/apk/release/*-release.apk"
        
