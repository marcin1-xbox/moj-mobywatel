name: Build Android APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create React Native Project
        run: |
          npx @react-native-community/cli@latest init MojaApka --skip-install --pm npm
          cp App.js MojaApka/App.js
          cd MojaApka && npm install

      - name: Build Release APK
        run: |
          cd MojaApka/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobywatel-apk
          path: MojaApka/android/app/build/outputs/apk/release/app-release.apk
          
