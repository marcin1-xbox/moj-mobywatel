name: Build Android APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Unzip Project
        run: |
          if [ -f fObywatel-main.zip ]; then
            unzip fObywatel-main.zip
            PROJECT_DIR="fObywatel-main"
          elif [ -f ai_studio_code.zip ]; then
            unzip ai_studio_code.zip
            PROJECT_DIR="ai_studio_code"
          else
            PROJECT_DIR="."
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          cd ${{ env.PROJECT_DIR }}
          if [ -f ../App.js ]; then
            cp ../App.js ./App.js || cp ../App.js ./src/App.js || true
          fi
          npm install --legacy-peer-deps

      - name: Manual Bundle Generation
        run: |
          cd ${{ env.PROJECT_DIR }}
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file App.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res || true

      - name: Build Release APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          TARGET_DIR=$(find . -name "gradlew" -exec dirname {} \;)
          cd $TARGET_DIR
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobywatel-apk
          path: "**/build/outputs/apk/release/*-release.apk"
          
